# config file 적용 
bind r source-file ~/.tmux.conf

# default shell
set -g default-shell /bin/zsh

# command mode를 ctrl + a로 변경
set -g prefix C-a

# 색상 팔레트 (catppuccin macchiato + custom)
# 모든 색상은 여기서 한 곳에 정의 — 변경 시 이곳만 수정
set -g @_c_crust       "#181926"   # 어두운 텍스트 (밝은 bg 위)
set -g @_c_mantle      "#1e2030"   # 평시 status bar bg
set -g @_c_text        "#cad3f5"   # 밝은 텍스트 (어두운 bg 위)
set -g @_c_mauve       "#c6a0f6"   # 현재 창, active border
set -g @_c_mauve_dark  "#7a5bb5"   # 다른 창 출력 중 인덱스
set -g @_c_yellow      "#eed49f"   # 작업 완료, kill-pane title
set -g @_c_peach       "#f5a97f"   # bell 알림
set -g @_c_green       "#a6da95"   # session 박스
set -g @_c_sapphire    "#7dc4e4"   # datetime 박스
set -g @_c_ash         "#c8c8dc"   # dir 박스 (custom)
set -g @_c_slate       "#54586e"   # copy-mode bg, status-right bg
set -g @_c_slate_2     "#5b6078"   # 현재 창 copy-mode 텍스트 bg
set -g @_c_overlay_0   "#6e738d"   # pane border 평시

# pane 동시 입력 토글 키 y 설정
bind-key y set-window-option synchronize-panes 

# pane 분할키를 | 과 - 로 변경
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# window 이동 (한글 IME 영향 없는 키 사용)
bind [ previous-window
bind ] next-window
bind Left  previous-window
bind Right next-window

# window 이동 prefix 없는 빠른 단축키 (root 테이블)
bind -n S-Left  previous-window
bind -n S-Right next-window

# 크롬 스타일 윈도우 이동 (Cmd+Shift+[/])
# iTerm2 측 매핑: Cmd+Shift+[ → Send Escape Sequence "{",  Cmd+Shift+] → "}"
bind -n "M-{" previous-window
bind -n "M-}" next-window

# 윈도우 직접 점프 (M-숫자 = iTerm2 Cmd+숫자 매핑 받음)
# iTerm2 측 설정: Settings → Profiles → Keys → Key Bindings →
#   Cmd+N → Send Escape Sequence → "N" (그 숫자)
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# new-window / last-window 한글 IME 대체 (기본 c, l 유지)
bind +   new-window
bind \\  last-window

# 다음 작업완료(silence + @was_active=1) 윈도우 순환 점프
bind Tab run-shell "~/.tmux-jump-completed.sh"

# pane 삭제 확인 popup (x / BSpace / fn+Delete=DC) — command-alias 로 메뉴 정의 한 번만
set -s command-alias[100] 'kill-pane-popup=display-menu \
    -T "#[bg=#{@_c_yellow} fg=#{@_c_crust} bold] 󰩹 Kill pane #P? " \
    -b rounded \
    -S "fg=#{@_c_yellow}" \
    -H "bg=#{@_c_yellow} fg=#{@_c_crust} bold" \
    -x C -y C \
    "Yes" y { kill-pane } \
    "No"  n {}'
bind x      kill-pane-popup
bind BSpace kill-pane-popup
bind DC     kill-pane-popup

# pane 이동 (Prefix + Shift + 화살표). Prefix + 화살표는 window 이동에 사용 중
bind S-Up    select-pane -U
bind S-Down  select-pane -D
bind S-Left  select-pane -L
bind S-Right select-pane -R

# copy-mode / paste-buffer 키 재배치 ([, ] 는 window 이동에 사용)
# IME 무관한 Enter 사용.
bind Enter copy-mode -H
bind P paste-buffer

### 옵션
bind-key    -T copy-mode-vi C-b         send-keys -X page-up
bind-key    -T copy-mode-vi C-f         send-keys -X page-down
bind-key    -T copy-mode-vi Escape      send-keys -X cancel
bind-key    -T copy-mode-vi BSpace      send-keys -X cancel
bind-key    -T copy-mode-vi DC          send-keys -X cancel

# 화살표 스크롤 (copy-mode 자동 진입). Ctrl+Shift = 반 페이지, Shift = 5줄, 그냥 = 1줄
bind -n S-Up   copy-mode -H \; send-keys -N 5 -X scroll-up
bind -n S-Down copy-mode -H \; send-keys -N 5 -X scroll-down
bind-key -T copy-mode-vi S-Up   send-keys -N 5 -X scroll-up
bind-key -T copy-mode-vi S-Down send-keys -N 5 -X scroll-down
bind -n C-S-Up   copy-mode -H \; send-keys -X halfpage-up
bind -n C-S-Down copy-mode -H \; send-keys -X halfpage-down
bind-key -T copy-mode-vi C-S-Up   send-keys -X halfpage-up
bind-key -T copy-mode-vi C-S-Down send-keys -X halfpage-down

# 반페이지 스크롤 (Cmd+Shift+↑/↓ → iTerm2 매핑 → M-K/M-J)
# iTerm2: Cmd+Shift+↑ → Send Escape Sequence "K", Cmd+Shift+↓ → "J"
bind -n M-K copy-mode -H \; send-keys -X halfpage-up
bind -n M-J copy-mode -H \; send-keys -X halfpage-down
bind-key -T copy-mode-vi M-K send-keys -X halfpage-up
bind-key -T copy-mode-vi M-J send-keys -X halfpage-down

# copy-mode 내 그냥 ↑/↓ 는 1줄 viewport 스크롤 (커서 이동 X)
bind-key -T copy-mode-vi Up   send-keys -X scroll-up
bind-key -T copy-mode-vi Down send-keys -X scroll-down

# copy-mode 내 Shift+K / Shift+J 로 반 페이지 위/아래
bind-key -T copy-mode-vi K send-keys -X halfpage-up
bind-key -T copy-mode-vi J send-keys -X halfpage-down

# True Color 지원
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'

# Claude Code 완료 감지 (N초 무출력 시 상태바 하이라이트)
set -g monitor-silence 1
set -g silence-action other
set -g window-status-activity-style 'bg=#{@_c_yellow},fg=#{@_c_crust}'

# Bell 발생 window 하이라이트
set -g monitor-bell on
set -g window-status-bell-style 'bg=#{@_c_peach},fg=#{@_c_crust}'

# 윈도우 이름 자동 변경 비활성화
set -g automatic-rename off
set -g allow-rename off

# Catppuccin 테마
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_flags_icon_silent " 󰸞"
set -g @catppuccin_window_flags_icon_last " 󰛿"
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_directory_color "#c8c8dc"
set -g @catppuccin_status_directory_icon_bg "#c8c8dc"
set -g status-left ""
set -g status-interval 2

# catppuccin session 박스: 항상 초록 (기본 prefix→빨강 토글 비활성)
# 주의: catppuccin은 module 로드 시 status format 을 정적 빌드해서 캐시함.
#       reload 시 캐시 변수를 unset 해야 새 색상으로 재빌드됨.
set -ug @catppuccin_status_session
set -ug @catppuccin_status_session_icon_bg
set -g @catppuccin_session_color "#{@_c_green}"
set -g status-right "#{?client_prefix,#[fg=#{@_c_yellow}]#[bg=#{@_c_yellow} fg=#{@_c_crust} bold] ⌘ PREFIX #[bg=default fg=#{@_c_yellow}]  ,}#{?#{||:#{pane_in_mode},#{client_prefix}},#(~/.tmux-spinner.sh)  #[fg=#{@_c_green} bg=#{@_c_slate}]#[fg=#{@_c_crust} bg=#{@_c_green}] #[fg=#{@_c_text} bg=#{@_c_slate}] #S#[fg=#{@_c_slate} bg=#{@_c_slate}] #[fg=#{@_c_ash} bg=#{@_c_slate}]#[fg=#{@_c_crust} bg=#{@_c_ash}] #[fg=#{@_c_text} bg=#{@_c_slate}] #{b:pane_current_path}#[fg=#{@_c_slate} bg=#{@_c_slate}] #[fg=#{@_c_sapphire} bg=#{@_c_slate}]#[fg=#{@_c_crust} bg=#{@_c_sapphire}]󰃰 #[fg=#{@_c_text} bg=#{@_c_slate}] %Y-%m-%d %H:%M#[fg=#{@_c_slate} bg=#{@_c_slate}] ,#(~/.tmux-spinner.sh)  #{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}}"
set -g status-right-length 200

# 플러그인
set -g @plugin 'catppuccin/tmux'

# TPM 초기화 (반드시 맨 아래)
run '~/.tmux/plugins/tpm/tpm'

# copy-mode 시 pane border 색상 변경 (TPM 이후 catppuccin 덮어쓰기 방지)
set -g pane-active-border-style "#{?pane_in_mode,fg=#{@_c_slate} bg=#{@_c_slate},fg=#{@_c_mauve}}"
set -g pane-border-style "#{?pane_in_mode,fg=#{@_c_slate} bg=#{@_c_slate},fg=#{@_c_overlay_0}}"

# copy-mode 진입 시 상단 슬레이트 바 + COPY MODE 표시 (hook으로 동적 토글)
set -g pane-border-format "#{?pane_in_mode,#[fg=#(~/.tmux-pulse-mauve.sh) bg=#{@_c_slate}]#[bg=#(~/.tmux-pulse-mauve.sh) fg=#{@_c_crust} bold] 󰍉 COPY MODE #[bg=#{@_c_slate} fg=#(~/.tmux-pulse-mauve.sh)]#[align=right]#[fg=#(~/.tmux-pulse-mauve.sh) bg=#{@_c_slate}]#[bg=#(~/.tmux-pulse-mauve.sh) fg=#{@_c_crust} bold] [#{scroll_position}/#{history_size}] #[bg=#{@_c_slate} fg=#(~/.tmux-pulse-mauve.sh)],}"

# 이전 hook 정리
set-hook -gu alert-silence
set-hook -gu alert-activity

# window 전환 시 새 window의 @was_active 해제 (초록 → 회색)
# @was_active=1은 Claude Code Stop hook에서 설정 (settings.json)
set-hook -g session-window-changed 'set-option -w @was_active 0'

# Catppuccin 덮어쓰기 방지: TPM 이후 사각 박스 형식 + 상태별 색상
# 인덱스 박스 색상 (각 상태별 스타일 코드)
set -g @_idx_running "#[fg=#{@_c_text} bg=#{@_c_mauve_dark}]"
set -g @_idx_done    "#[fg=#{@_c_crust} bg=#(~/.tmux-pulse-yellow.sh)]"
set -g @_idx_idle    "#[fg=#{@_c_crust} bg=#{@thm_overlay_2}]"

# 다른 창 상태 분기:
#   출력 중(!silence + !active) → running
#   작업 완료(silence + was_active=1) → done
#   그 외 → idle
set -g @_idx_other "#{?#{&&:#{!=:#{window_silence_flag},1},#{!=:#{window_active},1}},#{E:@_idx_running},#{?#{&&:#{window_silence_flag},#{==:#{@was_active},1}},#{E:@_idx_done},#{E:@_idx_idle}}}"

# 텍스트 영역 bg (copy-mode 시 슬레이트 토글)
set -g @_text_other   "#{?pane_in_mode,#{@_c_slate},#{@thm_surface_0}}"
set -g @_text_current "#{?pane_in_mode,#{@_c_slate_2},#{@thm_surface_1}}"

# 플래그 suffix (bell, zoom — 공통)
set -g @_w_flags "#{?window_bell_flag, 󰂞,}#{?window_zoomed_flag, 󰁌,}"

# 최종 format
set -g window-status-format         "#{E:@_idx_other} #I #[fg=#{@_c_text} bg=#{E:@_text_other}] #W#{E:@_w_flags} "
set -g window-status-current-format "#[fg=#{@_c_crust} bg=#{@thm_mauve}] #I #[fg=#{@_c_text} bg=#{E:@_text_current}] #W#{E:@_w_flags} "
set -g window-status-separator ""

# status-style: copy-mode 또는 prefix 활성 시 슬레이트, 평시 mantle
set -g status-style "bg=#{?#{||:#{pane_in_mode},#{client_prefix}},#{@_c_slate},#{@_c_mantle}} fg=#{@_c_text}"

# copy-mode 진입/이탈 시 pane-border-status 토글 (윈도우 단위)
# status-style / status-right / window-status-format 은 pane_in_mode 로 자동 재평가
set-hook -g pane-mode-changed { if -F "#{pane_in_mode}" {
    set -w pane-border-status top
} {
    set -w pane-border-status off
} }