# config file 적용 
bind r source-file ~/.tmux.conf

# default shell
set -g default-shell /bin/zsh

# command mode를 ctrl + a로 변경
set -g prefix C-a

# pane 동시 입력 토글 키 y 설정
bind-key y set-window-option synchronize-panes 

# pane 분할키를 | 과 - 로 변경
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# window 이동 (한글 IME 영향 없는 키 사용)
bind [ previous-window
bind ] next-window
bind Left  previous-window
bind Right next-window

# new-window / last-window 한글 IME 대체 (기본 c, l 유지)
bind +   new-window
bind Tab last-window
bind \\  last-window

# pane 삭제 (x / BSpace / fn+Delete=DC) — 화면 가운데 menu 확인창
bind x display-menu -T "#[bg=#eed49f fg=#181926 bold] 󰩹 Kill pane #P? " \
    -b rounded \
    -S "fg=#eed49f" \
    -H "bg=#eed49f fg=#181926 bold" \
    -x C -y C \
    "Yes" y { kill-pane } \
    "No"  n {}
bind BSpace display-menu -T "#[bg=#eed49f fg=#181926 bold] 󰩹 Kill pane #P? " \
    -b rounded \
    -S "fg=#eed49f" \
    -H "bg=#eed49f fg=#181926 bold" \
    -x C -y C \
    "Yes" y { kill-pane } \
    "No"  n {}
bind DC display-menu -T "#[bg=#eed49f fg=#181926 bold] 󰩹 Kill pane #P? " \
    -b rounded \
    -S "fg=#eed49f" \
    -H "bg=#eed49f fg=#181926 bold" \
    -x C -y C \
    "Yes" y { kill-pane } \
    "No"  n {}

# pane 이동 (Prefix + Shift + 화살표). Prefix + 화살표는 window 이동에 사용 중
bind S-Up    select-pane -U
bind S-Down  select-pane -D
bind S-Left  select-pane -L
bind S-Right select-pane -R

# copy-mode / paste-buffer 키 재배치 ([, ] 는 window 이동에 사용)
# IME 무관한 Enter 사용.
bind Enter copy-mode -H
bind P paste-buffer

### 옵션
bind-key    -T copy-mode-vi C-b         send-keys -X page-up
bind-key    -T copy-mode-vi C-f         send-keys -X page-down
bind-key    -T copy-mode-vi Escape      send-keys -X cancel

# 화살표 스크롤 (copy-mode 자동 진입). Ctrl+Shift = 반 페이지, Shift = 5줄, 그냥 = 1줄
bind -n S-Up   copy-mode -H \; send-keys -N 5 -X scroll-up
bind -n S-Down copy-mode -H \; send-keys -N 5 -X scroll-down
bind-key -T copy-mode-vi S-Up   send-keys -N 5 -X scroll-up
bind-key -T copy-mode-vi S-Down send-keys -N 5 -X scroll-down
bind -n C-S-Up   copy-mode -H \; send-keys -X halfpage-up
bind -n C-S-Down copy-mode -H \; send-keys -X halfpage-down
bind-key -T copy-mode-vi C-S-Up   send-keys -X halfpage-up
bind-key -T copy-mode-vi C-S-Down send-keys -X halfpage-down

# copy-mode 내 그냥 ↑/↓ 는 1줄 viewport 스크롤 (커서 이동 X)
bind-key -T copy-mode-vi Up   send-keys -X scroll-up
bind-key -T copy-mode-vi Down send-keys -X scroll-down

# copy-mode 내 Shift+K / Shift+J 로 반 페이지 위/아래
bind-key -T copy-mode-vi K send-keys -X halfpage-up
bind-key -T copy-mode-vi J send-keys -X halfpage-down

# True Color 지원
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'

# Claude Code 완료 감지 (N초 무출력 시 상태바 하이라이트)
set -g monitor-silence 1
set -g silence-action other
set -g window-status-activity-style 'bg=#eed49f,fg=#181926'

# Bell 발생 window 하이라이트
set -g monitor-bell on
set -g window-status-bell-style 'bg=#f5a97f,fg=#181926'

# 윈도우 이름 자동 변경 비활성화
set -g automatic-rename off
set -g allow-rename off

# Catppuccin 테마
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_flags_icon_silent " 󰸞"
set -g @catppuccin_window_flags_icon_last " 󰛿"
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_directory_color "#c8c8dc"
set -g @catppuccin_status_directory_icon_bg "#c8c8dc"
set -g status-left ""
set -g status-interval 1
set -g status-right "#[fg=#c6a0f6]#[bg=#c6a0f6,fg=#181926] #(~/.tmux-spinner.sh) #[bg=default,fg=#c6a0f6]   #{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"
set -g status-right-length 200

# 플러그인
set -g @plugin 'catppuccin/tmux'

# TPM 초기화 (반드시 맨 아래)
run '~/.tmux/plugins/tpm/tpm'

# copy-mode 시 pane border 색상 변경 (TPM 이후 catppuccin 덮어쓰기 방지)
set -g pane-active-border-style "#{?pane_in_mode,fg=#eed49f bg=#eed49f,fg=#c6a0f6}"
set -g pane-border-style "#{?pane_in_mode,fg=#eed49f bg=#eed49f,fg=#6e738d}"

# copy-mode 진입 시 상단 노란 바 + COPY MODE 표시 (hook으로 동적 토글)
set -g pane-border-format "#{?pane_in_mode,#[bg=#eed49f fg=#181926 bold] 󰍉 COPY MODE #[align=right][#{scroll_position}/#{history_size}] ,}"

# 이전 hook 정리
set-hook -gu alert-silence
set-hook -gu alert-activity

# window 전환 시 새 window의 @was_active 해제 (초록 → 회색)
# @was_active=1은 Claude Code Stop hook에서 설정 (settings.json)
set-hook -g session-window-changed 'set-option -w @was_active 0'

# Catppuccin 덮어쓰기 방지: TPM 이후 bell/silence 조건부 색상 적용
# 인덱스 색상: 활성(보라) / silence+was_active(노랑, 작업완료) / silence(회색, idle)
# chevron separator 없는 깔끔한 사각 박스 형식 (평시/copy-mode 공통)
set -g window-status-format "#{?#{&&:#{!=:#{window_silence_flag},1},#{!=:#{window_active},1}},#[fg=#cad3f5 bg=#7a5bb5],#{?#{&&:#{window_silence_flag},#{==:#{@was_active},1}},#[fg=#181926 bg=#eed49f],#[fg=#181926 bg=#{@thm_overlay_2}]}} #I #[fg=#cad3f5 bg=#{@thm_surface_0}] #W#{?#{&&:#{==:#{@was_active},1},#{!=:#{@claude_summary},}}, (#{@claude_summary}),}#{?window_bell_flag, 󰂞,}#{?window_zoomed_flag, 󰁌,} "
set -g window-status-current-format "#[fg=#181926 bg=#{@thm_mauve}] #I #[fg=#cad3f5 bg=#{@thm_surface_1}] #W#{?window_bell_flag, 󰂞,}#{?window_zoomed_flag, 󰁌,} "
set -g window-status-separator ""

# 기본 status bar 스타일 (catppuccin 보강 — set -gu 시 초록 폴백 방지)
set -g status-style "bg=#1e2030,fg=#cad3f5"

# copy-mode 시 status bar 배경만 노랑으로 토글
set-hook -g pane-mode-changed { if -F "#{pane_in_mode}" {
    set -w pane-border-status top
    set -g status-style "bg=#eed49f,fg=#181926"
} {
    set -w pane-border-status off
    set -g status-style "bg=#1e2030,fg=#cad3f5"
} }
